scraper:
  headless: true
  browser: chromium
  concurrency: 2
  timeout_ms: 30000
  retry_attempts: 3
  retry_base_delay_s: 2.0
  retry_jitter: true
  page_load_delay_ms: [800, 2000]
  max_pages_per_card: 10
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  base_url: "https://www.ligamagic.com.br"

cache:
  ttl_hours: 24
  ttl_not_found_hours: 6
  ttl_error_hours: 1

filters:
  min_condition: NM
  preferred_language: any
  ignore_foil: true
  min_stock: 1

optimizer:
  solver: auto
  objective: stores
  ilp_timeout_s: 120
  ortools_timeout_s: 300
  ilp_ortools_threshold: 15000
  max_stores: null

output:
  reports_dir: /app/reports
  formats:
    - excel
    - csv
    - markdown
  excel_open_after: false

logging:
  level: INFO
  file: /app/logs/cube-budget.log
  rotation: "10 MB"
  retention: "7 days"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {module}:{function}:{line} | {message}"
  colorize: true

database:
  path: /app/data/db/cube_budget.sqlite
  wal_mode: true
  busy_timeout_ms: 5000
